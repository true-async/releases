name: Build & Release TrueAsync PHP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      test_only:
        description: 'Test build only (no release, no artifacts saved)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Read build configuration
  # ---------------------------------------------------------------------------
  config:
    runs-on: ubuntu-latest
    outputs:
      php_src_repo: ${{ steps.read.outputs.php_src_repo }}
      php_src_branch: ${{ steps.read.outputs.php_src_branch }}
      async_repo: ${{ steps.read.outputs.async_repo }}
      async_branch: ${{ steps.read.outputs.async_branch }}
      xdebug_repo: ${{ steps.read.outputs.xdebug_repo }}
      xdebug_branch: ${{ steps.read.outputs.xdebug_branch }}
      frankenphp_repo: ${{ steps.read.outputs.frankenphp_repo }}
      frankenphp_branch: ${{ steps.read.outputs.frankenphp_branch }}
      server_repo: ${{ steps.read.outputs.server_repo }}
      server_branch: ${{ steps.read.outputs.server_branch }}
      phpredis_repo: ${{ steps.read.outputs.phpredis_repo }}
      phpredis_branch: ${{ steps.read.outputs.phpredis_branch }}
      clickhouse_repo: ${{ steps.read.outputs.clickhouse_repo }}
      clickhouse_branch: ${{ steps.read.outputs.clickhouse_branch }}
      version: ${{ steps.read.outputs.version }}
      php_version: ${{ steps.read.outputs.php_version }}
      is_prerelease: ${{ steps.read.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v7

      - name: Read build-config.json
        id: read
        run: |
          echo "php_src_repo=$(jq -r '.php_src.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "php_src_branch=$(jq -r '.php_src.branch' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "async_repo=$(jq -r '.extensions.async.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "async_branch=$(jq -r '.extensions.async.branch' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "xdebug_repo=$(jq -r '.extensions.xdebug.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "xdebug_branch=$(jq -r '.extensions.xdebug.branch' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "frankenphp_repo=$(jq -r '.frankenphp.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "frankenphp_branch=$(jq -r '.frankenphp.branch' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "server_repo=$(jq -r '.extensions.server.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "server_branch=$(jq -r '.extensions.server.branch' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "phpredis_repo=$(jq -r '.extensions.phpredis.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "phpredis_branch=$(jq -r '.extensions.phpredis.branch' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "clickhouse_repo=$(jq -r '.extensions.clickhouse.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "clickhouse_branch=$(jq -r '.extensions.clickhouse.branch' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "php_version=$(jq -r '.php_version' build-config.json)" >> "$GITHUB_OUTPUT"
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="dev-$(date +%Y%m%d-%H%M%S)"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc) ]]; then
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Windows x64 build (Release + Debug via matrix)
  # ---------------------------------------------------------------------------
  build-windows:
    name: "Windows x64 (${{ matrix.build_type }})"
    needs: config
    runs-on: windows-2025-vs2026
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_type: Release
            output_dir: Release_TS
            configure_flags: "--enable-snapshot-build --disable-debug-pack --enable-embed"
            install_prefix: "C:\\php-trueasync"
            artifact_suffix: ""
          - build_type: Debug
            output_dir: Debug_TS
            configure_flags: "--enable-debug --enable-embed"
            install_prefix: "C:\\php-trueasync-debug"
            artifact_suffix: "-debug"
    env:
      PHP_BUILD_CACHE_BASE_DIR: C:\build-cache
      PHP_BUILD_OBJ_DIR: C:\obj
      PHP_BUILD_CACHE_SDK_DIR: C:\build-cache\sdk
      PHP_BUILD_SDK_BRANCH: php-sdk-2.7.1
      PHP_BUILD_CRT: vs18
      PLATFORM: x64
      THREAD_SAFE: "1"
    steps:
      - name: git config
        run: git config --global core.autocrlf false && git config --global core.eol lf

      - uses: actions/checkout@v7

      - name: Checkout php-src
        uses: actions/checkout@v7
        with:
          repository: ${{ needs.config.outputs.php_src_repo }}
          ref: ${{ needs.config.outputs.php_src_branch }}
          path: php-src

      - name: Checkout ext/async
        uses: actions/checkout@v7
        with:
          repository: ${{ needs.config.outputs.async_repo }}
          ref: ${{ needs.config.outputs.async_branch }}
          path: async

      - name: Copy async extension to ext/async
        shell: cmd
        run: |
          if not exist php-src\ext\async mkdir php-src\ext\async
          xcopy /E /I /H /Y async php-src\ext\async

      - name: Checkout xdebug
        uses: actions/checkout@v7
        with:
          repository: ${{ needs.config.outputs.xdebug_repo }}
          ref: ${{ needs.config.outputs.xdebug_branch }}
          path: xdebug

      - name: Setup LibUV
        shell: powershell
        env:
          VCPKG_DEFAULT_BINARY_CACHE: C:\vcpkg-cache
        run: |
          # Install cmake and ninja so vcpkg doesn't try to download them
          choco install cmake ninja -y --no-progress | Out-Null

          if (!(Test-Path "C:\vcpkg")) {
            git clone --depth 1 --branch 2025.04.09 https://github.com/Microsoft/vcpkg.git C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }

          New-Item -ItemType Directory -Force -Path C:\vcpkg-cache | Out-Null
          C:\vcpkg\vcpkg.exe install libuv:x64-windows-static-md

      - name: Setup PHP SDK
        shell: cmd
        run: |
          if not exist "%PHP_BUILD_CACHE_BASE_DIR%" mkdir "%PHP_BUILD_CACHE_BASE_DIR%"
          if not exist "%PHP_BUILD_OBJ_DIR%" mkdir "%PHP_BUILD_OBJ_DIR%"
          git clone --branch %PHP_BUILD_SDK_BRANCH% --depth 1 https://github.com/php/php-sdk-binary-tools.git "%PHP_BUILD_CACHE_SDK_DIR%"

      - name: Detect PHP branch and download deps
        shell: cmd
        run: |
          cd php-src
          for /f "usebackq tokens=3" %%i in (`findstr PHP_MAJOR_VERSION main\php_version.h`) do set BRANCH=%%i
          for /f "usebackq tokens=3" %%i in (`findstr PHP_MINOR_VERSION main\php_version.h`) do set BRANCH=%BRANCH%.%%i

          echo BRANCH=%BRANCH%>> %GITHUB_ENV%

          set DEPS_DIR=%PHP_BUILD_CACHE_BASE_DIR%\deps-%BRANCH%-%PHP_BUILD_CRT%-%PLATFORM%
          echo DEPS_DIR=%DEPS_DIR%>> %GITHUB_ENV%

          set SDK_RUNNER=%PHP_BUILD_CACHE_SDK_DIR%\phpsdk-%PHP_BUILD_CRT%-%PLATFORM%.bat

          REM Create task script for downloading deps
          > %GITHUB_WORKSPACE%\task_deps.bat echo @echo off
          >> %GITHUB_WORKSPACE%\task_deps.bat echo phpsdk_deps --update --no-backup --branch %BRANCH% --stability staging --deps %DEPS_DIR% --crt %PHP_BUILD_CRT%
          >> %GITHUB_WORKSPACE%\task_deps.bat echo if %%errorlevel%% neq 0 exit /b 3

          cmd /c %SDK_RUNNER% -t %GITHUB_WORKSPACE%\task_deps.bat
          if %errorlevel% neq 0 exit /b %errorlevel%

          REM Copy LibUV from vcpkg to deps directory
          if not exist "%DEPS_DIR%\include\libuv" mkdir "%DEPS_DIR%\include\libuv"
          if not exist "%DEPS_DIR%\lib" mkdir "%DEPS_DIR%\lib"
          if not exist "%DEPS_DIR%\bin" mkdir "%DEPS_DIR%\bin"
          copy "C:\vcpkg\installed\x64-windows-static-md\include\uv.h" "%DEPS_DIR%\include\libuv\uv.h"
          xcopy /E /I /H /Y "C:\vcpkg\installed\x64-windows-static-md\include\uv" "%DEPS_DIR%\include\libuv\uv\"
          copy "C:\vcpkg\installed\x64-windows-static-md\lib\libuv.lib" "%DEPS_DIR%\lib\libuv.lib"

      - name: Create build task script
        shell: pwsh
        run: |
          $prefix = "${{ matrix.install_prefix }}"
          $flags = "${{ matrix.configure_flags }}"
          @(
            "@echo off",
            "cd /d $($env:GITHUB_WORKSPACE)\php-src",
            "if %errorlevel% neq 0 exit /b 3",
            "call buildconf.bat --force",
            "if %errorlevel% neq 0 exit /b 3",
            "call configure.bat $flags --enable-object-out-dir=%PHP_BUILD_OBJ_DIR% --with-php-build=%DEPS_DIR% --enable-async --with-prefix=$prefix",
            "if %errorlevel% neq 0 exit /b 3",
            "nmake /NOLOGO",
            "if %errorlevel% neq 0 exit /b 3",
            "nmake build-devel",
            "if %errorlevel% neq 0 exit /b 3",
            "exit /b 0"
          ) | Set-Content -Path "$env:GITHUB_WORKSPACE\task_build.bat" -Encoding ASCII

      - name: Build PHP
        shell: cmd
        run: |
          set SDK_RUNNER=%PHP_BUILD_CACHE_SDK_DIR%\phpsdk-%PHP_BUILD_CRT%-%PLATFORM%.bat
          cmd /c %SDK_RUNNER% -t %GITHUB_WORKSPACE%\task_build.bat
          if %errorlevel% neq 0 exit /b %errorlevel%

      - name: Run ext/async tests
        shell: cmd
        run: |
          set PHP_BIN=%PHP_BUILD_OBJ_DIR%\${{ matrix.output_dir }}\php.exe

          REM Copy dependency DLLs next to php.exe so it can find them
          copy "%DEPS_DIR%\bin\*.dll" "%PHP_BUILD_OBJ_DIR%\${{ matrix.output_dir }}\"

          echo Running ext/async tests...
          "%PHP_BIN%" php-src\run-tests.php --show-diff -p "%PHP_BIN%" php-src\ext\async\tests\
          if %errorlevel% neq 0 exit /b %errorlevel%
          echo All ext/async tests passed.

      - name: Create xdebug build task script
        shell: pwsh
        run: |
          # Find phpize.bat from the devel directory created by nmake build-devel
          $objDir = "$env:PHP_BUILD_OBJ_DIR\${{ matrix.output_dir }}"
          $develDir = Get-ChildItem -Path $objDir -Directory -Filter "*-devel-*" -ErrorAction SilentlyContinue |
                      Select-Object -First 1
          if (-not $develDir) {
            Write-Error "Devel directory not found in $objDir"
            exit 1
          }
          $phpize = Join-Path $develDir.FullName "phpize.bat"
          if (!(Test-Path $phpize)) {
            Write-Error "phpize.bat not found in $($develDir.FullName)"
            exit 1
          }
          Write-Host "Using phpize: $phpize"
          @(
            "@echo off",
            "cd /d $($env:GITHUB_WORKSPACE)\xdebug",
            "if %errorlevel% neq 0 exit /b 3",
            "call `"$phpize`"",
            "if %errorlevel% neq 0 exit /b 3",
            "call configure.bat --with-php-build=%DEPS_DIR% --with-xdebug",
            "if %errorlevel% neq 0 exit /b 3",
            "nmake /NOLOGO",
            "if %errorlevel% neq 0 exit /b 3",
            "exit /b 0"
          ) | Set-Content -Path "$env:GITHUB_WORKSPACE\task_xdebug.bat" -Encoding ASCII

      - name: Build xdebug
        shell: cmd
        run: |
          set SDK_RUNNER=%PHP_BUILD_CACHE_SDK_DIR%\phpsdk-%PHP_BUILD_CRT%-%PLATFORM%.bat
          cmd /c %SDK_RUNNER% -t %GITHUB_WORKSPACE%\task_xdebug.bat
          if %errorlevel% neq 0 exit /b %errorlevel%

      - name: Verify xdebug build
        shell: pwsh
        run: |
          $xdebugDir = "$env:GITHUB_WORKSPACE\xdebug"
          Write-Host "=== DLLs in xdebug build output ==="
          Get-ChildItem -Path $xdebugDir -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue |
            Select-Object Name | Sort-Object Name | Format-Table -AutoSize
          $dll = Get-ChildItem -Path $xdebugDir -Recurse -Filter "php_xdebug.dll" -ErrorAction SilentlyContinue |
                 Select-Object -First 1
          if (-not $dll) {
            Write-Error "php_xdebug.dll NOT found under $xdebugDir - xdebug build failed"
            exit 1
          }
          Write-Host "SUCCESS: php_xdebug.dll found at $($dll.FullName)"

      # ── Server extension ──────────────────────────────────────────────────
      - name: Checkout server
        uses: actions/checkout@v7
        with:
          repository: ${{ needs.config.outputs.server_repo }}
          ref: ${{ needs.config.outputs.server_branch }}
          path: server

      - name: Create server build task script
        shell: pwsh
        run: |
          $objDir = "$env:PHP_BUILD_OBJ_DIR\${{ matrix.output_dir }}"
          $develDir = Get-ChildItem -Path $objDir -Directory -Filter "*-devel-*" -ErrorAction SilentlyContinue |
                      Select-Object -First 1
          if (-not $develDir) {
            Write-Error "Devel directory not found in $objDir"
            exit 1
          }
          $phpize = Join-Path $develDir.FullName "phpize.bat"
          if (!(Test-Path $phpize)) {
            Write-Error "phpize.bat not found in $($develDir.FullName)"
            exit 1
          }
          Write-Host "Using phpize: $phpize"
          @(
            "@echo off",
            "cd /d $($env:GITHUB_WORKSPACE)\server",
            "if %errorlevel% neq 0 exit /b 3",
            "call `"$phpize`"",
            "if %errorlevel% neq 0 exit /b 3",
            "call configure.bat --with-php-build=%DEPS_DIR% --enable-true-async-server --enable-http2",
            "if %errorlevel% neq 0 exit /b 3",
            "nmake /NOLOGO",
            "if %errorlevel% neq 0 exit /b 3",
            "exit /b 0"
          ) | Set-Content -Path "$env:GITHUB_WORKSPACE\task_server.bat" -Encoding ASCII

      - name: Build server
        shell: cmd
        run: |
          set SDK_RUNNER=%PHP_BUILD_CACHE_SDK_DIR%\phpsdk-%PHP_BUILD_CRT%-%PLATFORM%.bat
          cmd /c %SDK_RUNNER% -t %GITHUB_WORKSPACE%\task_server.bat
          if %errorlevel% neq 0 exit /b %errorlevel%

      - name: Verify server build
        shell: pwsh
        run: |
          $serverDir = "$env:GITHUB_WORKSPACE\server"
          Write-Host "=== DLLs in server build output ==="
          Get-ChildItem -Path $serverDir -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue |
            Select-Object Name | Sort-Object Name | Format-Table -AutoSize
          $dll = Get-ChildItem -Path $serverDir -Recurse -Filter "php_true_async_server.dll" -ErrorAction SilentlyContinue |
                 Select-Object -First 1
          if (-not $dll) {
            Write-Error "php_true_async_server.dll NOT found under $serverDir - server build failed"
            exit 1
          }
          Write-Host "SUCCESS: php_true_async_server.dll found at $($dll.FullName)"

      # ── phpredis ─────────────────────────────────────────────────────────
      - name: Checkout phpredis
        uses: actions/checkout@v7
        with:
          repository: ${{ needs.config.outputs.phpredis_repo }}
          ref: ${{ needs.config.outputs.phpredis_branch }}
          path: phpredis

      - name: Create phpredis build task script
        shell: pwsh
        run: |
          $objDir = "$env:PHP_BUILD_OBJ_DIR\${{ matrix.output_dir }}"
          $develDir = Get-ChildItem -Path $objDir -Directory -Filter "*-devel-*" -ErrorAction SilentlyContinue |
                      Select-Object -First 1
          if (-not $develDir) {
            Write-Error "Devel directory not found in $objDir"
            exit 1
          }
          $phpize = Join-Path $develDir.FullName "phpize.bat"
          if (!(Test-Path $phpize)) {
            Write-Error "phpize.bat not found in $($develDir.FullName)"
            exit 1
          }
          Write-Host "Using phpize: $phpize"
          @(
            "@echo off",
            "cd /d $($env:GITHUB_WORKSPACE)\phpredis",
            "if %errorlevel% neq 0 exit /b 3",
            "call `"$phpize`"",
            "if %errorlevel% neq 0 exit /b 3",
            "call configure.bat --with-php-build=%DEPS_DIR% --enable-redis",
            "if %errorlevel% neq 0 exit /b 3",
            "nmake /NOLOGO",
            "if %errorlevel% neq 0 exit /b 3",
            "exit /b 0"
          ) | Set-Content -Path "$env:GITHUB_WORKSPACE\task_phpredis.bat" -Encoding ASCII

      - name: Build phpredis
        shell: cmd
        run: |
          set SDK_RUNNER=%PHP_BUILD_CACHE_SDK_DIR%\phpsdk-%PHP_BUILD_CRT%-%PLATFORM%.bat
          cmd /c %SDK_RUNNER% -t %GITHUB_WORKSPACE%\task_phpredis.bat
          if %errorlevel% neq 0 exit /b %errorlevel%

      - name: Verify phpredis build
        shell: pwsh
        run: |
          $phpredisDir = "$env:GITHUB_WORKSPACE\phpredis"
          Write-Host "=== DLLs in phpredis build output ==="
          Get-ChildItem -Path $phpredisDir -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue |
            Select-Object Name | Sort-Object Name | Format-Table -AutoSize
          $dll = Get-ChildItem -Path $phpredisDir -Recurse -Filter "php_redis.dll" -ErrorAction SilentlyContinue |
                 Select-Object -First 1
          if (-not $dll) {
            Write-Error "php_redis.dll NOT found under $phpredisDir - phpredis build failed"
            exit 1
          }
          Write-Host "SUCCESS: php_redis.dll found at $($dll.FullName)"

      # ── clickhouse ────────────────────────────────────────────────────────
      - name: Checkout clickhouse
        uses: actions/checkout@v7
        with:
          repository: ${{ needs.config.outputs.clickhouse_repo }}
          ref: ${{ needs.config.outputs.clickhouse_branch }}
          path: clickhouse
          submodules: recursive

      - name: Patch clickhouse-cpp for MSVC (zstd asm)
        shell: pwsh
        run: |
          $f = "$env:GITHUB_WORKSPACE\clickhouse\third_party\clickhouse-cpp\contrib\zstd\zstd\CMakeLists.txt"
          if (Test-Path $f) {
            (Get-Content -LiteralPath $f) `
              -replace '^\s*decompress/huf_decompress_amd64\.S\s*$',
                       '        # huf_decompress_amd64.S excluded on MSVC (C fallback used)' |
              Set-Content -LiteralPath $f
            Write-Host "Patched zstd CMakeLists.txt"
          } else {
            Write-Host "zstd CMakeLists.txt not found, skipping patch"
          }

      - name: Create clickhouse build task script
        shell: pwsh
        run: |
          $objDir = "$env:PHP_BUILD_OBJ_DIR\${{ matrix.output_dir }}"
          $develDir = Get-ChildItem -Path $objDir -Directory -Filter "*-devel-*" -ErrorAction SilentlyContinue |
                      Select-Object -First 1
          if (-not $develDir) {
            Write-Error "Devel directory not found in $objDir"
            exit 1
          }
          $phpize = Join-Path $develDir.FullName "phpize.bat"
          if (!(Test-Path $phpize)) {
            Write-Error "phpize.bat not found in $($develDir.FullName)"
            exit 1
          }
          Write-Host "Using phpize: $phpize"
          @(
            "@echo off",
            "cd /d $($env:GITHUB_WORKSPACE)\clickhouse",
            "if %errorlevel% neq 0 exit /b 3",
            "cmake -S third_party\clickhouse-cpp -B third_party\clickhouse-cpp\build -G `"NMake Makefiles`" -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl -DBUILD_SHARED_LIBS=OFF -DCH_MAP_BOOL_TO_UINT8=OFF -DWITH_OPENSSL=ON -DOPENSSL_ROOT_DIR=%DEPS_DIR% -DBUILD_TESTS=OFF -DBUILD_BENCHMARK=OFF",
            "if %errorlevel% neq 0 exit /b 3",
            "cmake --build third_party\clickhouse-cpp\build --parallel",
            "if %errorlevel% neq 0 exit /b 3",
            "call `"$phpize`"",
            "if %errorlevel% neq 0 exit /b 3",
            "call configure.bat --with-php-build=%DEPS_DIR% --enable-clickhouse-async",
            "if %errorlevel% neq 0 exit /b 3",
            "nmake /NOLOGO",
            "if %errorlevel% neq 0 exit /b 3",
            "exit /b 0"
          ) | Set-Content -Path "$env:GITHUB_WORKSPACE\task_clickhouse.bat" -Encoding ASCII

      - name: Build clickhouse
        shell: cmd
        run: |
          set SDK_RUNNER=%PHP_BUILD_CACHE_SDK_DIR%\phpsdk-%PHP_BUILD_CRT%-%PLATFORM%.bat
          cmd /c %SDK_RUNNER% -t %GITHUB_WORKSPACE%\task_clickhouse.bat
          if %errorlevel% neq 0 exit /b %errorlevel%

      - name: Verify clickhouse build
        shell: pwsh
        run: |
          $clickhouseDir = "$env:GITHUB_WORKSPACE\clickhouse"
          Write-Host "=== DLLs in clickhouse build output ==="
          Get-ChildItem -Path $clickhouseDir -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue |
            Select-Object Name | Sort-Object Name | Format-Table -AutoSize
          $dll = Get-ChildItem -Path $clickhouseDir -Recurse -Filter "php_clickhouse_async.dll" -ErrorAction SilentlyContinue |
                 Select-Object -First 1
          if (-not $dll) {
            Write-Error "php_clickhouse_async.dll NOT found under $clickhouseDir - clickhouse build failed"
            exit 1
          }
          Write-Host "SUCCESS: php_clickhouse_async.dll found at $($dll.FullName)"

      # ── FrankenPHP ────────────────────────────────────────────────────────
      - name: Checkout frankenphp
        uses: actions/checkout@v7
        with:
          repository: ${{ needs.config.outputs.frankenphp_repo }}
          ref: ${{ needs.config.outputs.frankenphp_branch }}
          path: frankenphp

      - name: Install vcpkg brotli and pthreads (FrankenPHP)
        shell: powershell
        env:
          VCPKG_DEFAULT_BINARY_CACHE: C:\vcpkg-cache
        run: |
          C:\vcpkg\vcpkg.exe install brotli:x64-windows pthreads:x64-windows

      - name: Download watcher (FrankenPHP)
        shell: powershell
        run: |
          $latestTag = gh release list --repo e-dant/watcher --limit 1 --exclude-drafts --exclude-pre-releases --json tagName --jq '.[0].tagName'
          Write-Host "Latest Watcher version: $latestTag"
          gh release download $latestTag --repo e-dant/watcher --pattern "*x86_64-pc-windows-msvc.tar" -O watcher.tar
          tar -xf "watcher.tar" -C "$env:GITHUB_WORKSPACE"
          Rename-Item -Path "$env:GITHUB_WORKSPACE\x86_64-pc-windows-msvc" -NewName "watcher"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go (FrankenPHP)
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: |
            frankenphp/go.sum
            frankenphp/caddy/go.sum
          check-latest: true

      - name: Build FrankenPHP
        shell: powershell
        run: |
          $version    = "${{ needs.config.outputs.version }}"
          $phpVersion = "${{ needs.config.outputs.php_version }}"
          $vcpkgRoot  = "C:\vcpkg\installed\x64-windows"
          $watcherRoot = "$env:GITHUB_WORKSPACE\watcher"
          $phpBinDir  = "$env:PHP_BUILD_OBJ_DIR\${{ matrix.output_dir }}"

          $develDir = Get-ChildItem -Path $phpBinDir -Directory -Filter "*-devel-*" -ErrorAction SilentlyContinue |
                      Select-Object -First 1
          if (-not $develDir) { Write-Error "PHP devel dir not found in $phpBinDir"; exit 1 }
          Write-Host "PHP devel dir: $($develDir.FullName)"

          # PHP devel headers are built with MSVC, but FrankenPHP compiles with Clang.
          # Tell zend_operators.h to use Clang's __builtin_*_overflow() instead of MSVC's LongLongAdd/Sub
          # (same defines PHP itself sets in win32/build/config.w32 for CLANG_TOOLSET).
          $clangBuiltins = "-DPHP_HAVE_BUILTIN_SADDL_OVERFLOW -DPHP_HAVE_BUILTIN_SADDLL_OVERFLOW -DPHP_HAVE_BUILTIN_SSUBL_OVERFLOW -DPHP_HAVE_BUILTIN_SSUBLL_OVERFLOW -DPHP_HAVE_BUILTIN_SMULL_OVERFLOW -DPHP_HAVE_BUILTIN_SMULLL_OVERFLOW"
          # PHP debug builds are compiled with /D ZEND_DEBUG=1 (see
          # php-src/win32/build/confutils.js toolset_setup_build_mode). That changes
          # the signatures of _emalloc/_efree/_estrdup/etc. (they get extra
          # ZEND_FILE_LINE_DC arguments). When FrankenPHP is built against the debug
          # devel pack, Clang must see the same define or it'll generate calls with
          # the short signature and the link will fail with "undefined symbol _emalloc".
          #
          # NOTE: setting -DZEND_DEBUG=1 via $env:CGO_CFLAGS does NOT work because the
          # `// #cgo windows CFLAGS:` directive in frankenphp/cgo_windows.go is appended
          # AFTER env vars and hardcodes -DZEND_DEBUG=0, overriding our value.
          # The fix is to use a Go build tag (`zend_debug`) which selects
          # frankenphp/cgo_windows_debug.go instead, where -DZEND_DEBUG=1 lives.
          $env:CGO_CFLAGS  = "$clangBuiltins -DFRANKENPHP_VERSION=$version -I$vcpkgRoot\include -I$watcherRoot -I$($develDir.FullName)\include -I$($develDir.FullName)\include\main -I$($develDir.FullName)\include\TSRM -I$($develDir.FullName)\include\Zend -I$($develDir.FullName)\include\ext"
          # Debug PHP builds name the main DLL/LIB as php8ts_debug.lib (see
          # php-src/win32/build/confutils.js, DEFINE("PHPLIB", ...)). The embed
          # SAPI keeps the plain php8embed.lib name in both builds.
          $phpLib = (Get-ChildItem -Path "$($develDir.FullName)\lib" -Filter "php*ts*.lib" | Select-Object -First 1).BaseName
          if (-not $phpLib) { Write-Error "Could not locate php*ts*.lib in $($develDir.FullName)\lib"; exit 1 }
          Write-Host "PHP lib basename: $phpLib"
          $env:CGO_LDFLAGS = "-L$vcpkgRoot\lib -lbrotlienc -L$watcherRoot -llibwatcher-c -L$phpBinDir -L$($develDir.FullName)\lib -l$phpLib -lphp8embed"
          $env:CC  = "clang"
          $env:CXX = "clang++"
          $env:PATH = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm\bin;$vcpkgRoot\bin;$watcherRoot;$phpBinDir;" + $env:PATH

          # The `zend_debug` build tag makes frankenphp/cgo_windows_debug.go take over
          # from cgo_windows.go and pass -DZEND_DEBUG=1 to clang, matching how
          # php8ts_debug.lib was compiled.
          $buildTags = "nobadger,nomysql,nopgx"
          if ("${{ matrix.build_type }}" -eq "Debug") {
            $buildTags = "zend_debug,$buildTags"
          }
          Write-Host "Go build tags: $buildTags"

          Push-Location frankenphp\caddy\frankenphp
          go build `
            -tags "$buildTags" `
            -ldflags="-extldflags=-fuse-ld=lld -X 'github.com/caddyserver/caddy/v2.CustomVersion=FrankenPHP $version PHP $phpVersion Caddy' -X 'github.com/caddyserver/caddy/v2.CustomBinaryName=frankenphp' -X 'github.com/caddyserver/caddy/v2/modules/caddyhttp.ServerHeader=FrankenPHP Caddy'"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Pop-Location

      - name: Package FrankenPHP
        shell: pwsh
        run: |
          $version    = "${{ needs.config.outputs.version }}"
          $phpVersion = "${{ needs.config.outputs.php_version }}"
          $vcpkgRoot  = "C:\vcpkg\installed\x64-windows"
          $watcherRoot = "$env:GITHUB_WORKSPACE\watcher"
          $suffix     = "${{ matrix.artifact_suffix }}"
          $archive    = "php-trueasync-${version}-php${phpVersion}-windows-x64${suffix}-frankenphp.zip"

          # Slim addon package: only FrankenPHP-specific files. The user
          # installs the main PHP archive first (which already contains
          # php8ts*.dll, ext/php_*.dll and php.ini), then extracts this
          # archive on top. This avoids shipping ~30 MiB of duplicate PHP
          # binaries in every FrankenPHP release.

          $stageDir = "$env:GITHUB_WORKSPACE\frankenphp-stage"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          # FrankenPHP binary
          Copy-Item "frankenphp\caddy\frankenphp\frankenphp.exe" $stageDir -Force

          # Watcher (FrankenPHP-only dep)
          Copy-Item "$watcherRoot\libwatcher-c.dll" $stageDir -Force

          # Brotli DLLs — the vcpkg builds FrankenPHP was linked against.
          # Main PHP ships its own brotli from deps, but FrankenPHP's cgo
          # LDFLAGS point at vcpkg, so the versions can differ. Ship the
          # ones that match FrankenPHP's import table.
          foreach ($dll in @("brotlienc.dll", "brotlidec.dll", "brotlicommon.dll")) {
            Copy-Item "$vcpkgRoot\bin\$dll" $stageDir -Force
          }

          # Pthreads-for-Windows (FrankenPHP cgo LDFLAGS: -lpthreadVC3)
          Copy-Item "$vcpkgRoot\bin\pthreadVC3.dll" $stageDir -Force

          Compress-Archive -Path "$stageDir\*" -DestinationPath "$env:GITHUB_WORKSPACE\$archive" -Force
          "FRANKENPHP_ARCHIVE=$archive" >> $env:GITHUB_ENV
          Write-Host "Packaged: $archive"
          Write-Host ""
          Write-Host "Archive contents:"
          Get-ChildItem $stageDir | Format-Table Name, @{N='Size';E={'{0:N0}' -f $_.Length}}

      - name: Upload FrankenPHP artifact
        if: ${{ !inputs.test_only }}
        uses: actions/upload-artifact@v7
        with:
          name: windows-x64${{ matrix.artifact_suffix }}-frankenphp
          path: ${{ env.FRANKENPHP_ARCHIVE }}
          retention-days: 5

      # ── PHP package ───────────────────────────────────────────────────────
      - name: Package
        shell: pwsh
        run: |
          $version    = "${{ needs.config.outputs.version }}"
          $phpVersion = "${{ needs.config.outputs.php_version }}"
          $suffix     = "${{ matrix.artifact_suffix }}"
          $buildDir   = "$env:PHP_BUILD_OBJ_DIR\${{ matrix.output_dir }}"
          $phpSrc     = "$env:GITHUB_WORKSPACE\php-src"
          $archive    = "php-trueasync-${version}-php${phpVersion}-windows-x64${suffix}.zip"

          # ── Create staging directory ──────────────────────────────────────────
          $stageDir = "$buildDir\stage"
          New-Item -ItemType Directory -Force -Path "$stageDir\ext" | Out-Null
          New-Item -ItemType Directory -Force -Path "$stageDir\dev" | Out-Null

          # ── Executables ───────────────────────────────────────────────────────
          Get-ChildItem $buildDir -Filter "*.exe" |
            Copy-Item -Destination $stageDir -Force

          # ── Root DLLs (php8ts.dll + dep DLLs, excluding php_*.dll extensions) ─
          $extDllNames = (Get-ChildItem $buildDir -Filter "php_*.dll").Name
          Get-ChildItem $buildDir -Filter "*.dll" |
            Where-Object { $_.Name -notin $extDllNames } |
            Copy-Item -Destination $stageDir -Force

          # ── Extension DLLs → ext/ ─────────────────────────────────────────────
          Get-ChildItem $buildDir -Filter "php_*.dll" |
            Copy-Item -Destination "$stageDir\ext" -Force

          # ── Import library → dev/ (php8ts.lib or php8ts_debug.lib) ───────────
          Get-ChildItem $buildDir -Filter "php*ts*.lib" |
            Copy-Item -Destination "$stageDir\dev" -Force

          # ── php.ini templates from php-src ────────────────────────────────────
          foreach ($ini in @("php.ini-development", "php.ini-production")) {
            $src = Join-Path $phpSrc $ini
            if (Test-Path $src) {
              Copy-Item $src $stageDir -Force
              Write-Host "Copied $ini"
            }
          }

          # ── libuv ─────────────────────────────────────────────────────────────
          if (Test-Path "$env:DEPS_DIR\bin\uv.dll") {
            Copy-Item "$env:DEPS_DIR\bin\uv.dll" $stageDir -Force
          }

          # ── Xdebug ────────────────────────────────────────────────────────────
          # phpize builds into xdebug\x64\<config>\ (not into $buildDir)
          $xdebugDll = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\xdebug" -Recurse `
                         -Filter "php_xdebug.dll" -ErrorAction SilentlyContinue |
                       Select-Object -First 1
          if (-not $xdebugDll) {
            Write-Error "php_xdebug.dll not found after xdebug build"
            exit 1
          }
          Copy-Item $xdebugDll.FullName -Destination "$stageDir\ext\php_xdebug.dll" -Force
          Write-Host "Added xdebug: $($xdebugDll.FullName) -> ext\php_xdebug.dll"

          # ── Server extension ──────────────────────────────────────────────────
          $serverDll = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\server" -Recurse `
                         -Filter "php_true_async_server.dll" -ErrorAction SilentlyContinue |
                       Select-Object -First 1
          if (-not $serverDll) {
            Write-Error "php_true_async_server.dll not found after server build"
            exit 1
          }
          Copy-Item $serverDll.FullName -Destination "$stageDir\ext\php_true_async_server.dll" -Force
          Write-Host "Added server: $($serverDll.FullName) -> ext\php_true_async_server.dll"

          # ── phpredis ──────────────────────────────────────────────────────────
          $phpredisDll = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\phpredis" -Recurse `
                           -Filter "php_redis.dll" -ErrorAction SilentlyContinue |
                         Select-Object -First 1
          if (-not $phpredisDll) {
            Write-Error "php_redis.dll not found after phpredis build"
            exit 1
          }
          Copy-Item $phpredisDll.FullName -Destination "$stageDir\ext\php_redis.dll" -Force
          Write-Host "Added phpredis: $($phpredisDll.FullName) -> ext\php_redis.dll"

          # ── clickhouse ────────────────────────────────────────────────────────
          $clickhouseDll = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\clickhouse" -Recurse `
                             -Filter "php_clickhouse_async.dll" -ErrorAction SilentlyContinue |
                           Select-Object -First 1
          if (-not $clickhouseDll) {
            Write-Error "php_clickhouse_async.dll not found after clickhouse build"
            exit 1
          }
          Copy-Item $clickhouseDll.FullName -Destination "$stageDir\ext\php_clickhouse_async.dll" -Force
          Write-Host "Added clickhouse: $($clickhouseDll.FullName) -> ext\php_clickhouse_async.dll"

          # ── php.ini (from development template + extensions + xdebug) ───────────
          $iniPath = Join-Path $stageDir "php.ini"
          $devIni  = Join-Path $stageDir "php.ini-development"
          if (Test-Path $devIni) { Copy-Item $devIni $iniPath -Force }
          $phpConfig = @(
            "",
            "extension_dir = `"ext`"",
            "",
            "; Core extensions (required for Symfony and most frameworks)",
            "extension=curl",
            "extension=fileinfo",
            "extension=gd",
            "extension=intl",
            "extension=mbstring",
            "extension=openssl",
            "extension=sodium",
            "extension=zip",
            "",
            "; Database",
            "extension=pdo_mysql",
            "extension=pdo_pgsql",
            "extension=pdo_sqlite",
            "",
            "; TrueAsync HTTP server (HTTP/1+2)",
            "extension=php_true_async_server.dll",
            "",
            "; Redis client",
            "extension=php_redis.dll",
            "",
            "; ClickHouse client",
            "extension=php_clickhouse_async.dll",
            "",
            "; Xdebug (loaded with mode=off - enable via xdebug.mode=debug etc.)",
            "zend_extension = php_xdebug.dll",
            "xdebug.mode = off"
          )
          Add-Content -Path $iniPath -Value $phpConfig
          Write-Host "Created php.ini"

          # ── Archive ───────────────────────────────────────────────────────────
          Compress-Archive -Path "$stageDir\*" `
            -DestinationPath "$env:GITHUB_WORKSPACE\$archive" -Force
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Upload artifact
        if: ${{ !inputs.test_only }}
        uses: actions/upload-artifact@v7
        with:
          name: windows-x64${{ matrix.artifact_suffix }}
          path: ${{ env.ARCHIVE }}
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Create GitHub Release with checksums
  # ---------------------------------------------------------------------------
  release:
    if: ${{ !inputs.test_only }}
    needs: [config, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Generate SHA256 checksums
        run: |
          cd release-files
          sha256sum * > sha256sums.txt
          cat sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ needs.config.outputs.is_prerelease == 'true' }}
          name: "TrueAsync PHP ${{ needs.config.outputs.version }} (php${{ needs.config.outputs.php_version }})"
          body: |
            ## TrueAsync PHP ${{ needs.config.outputs.version }} (php${{ needs.config.outputs.php_version }})

            PHP with built-in TrueAsync support and Xdebug.

            ### Included extensions
            - **async** — TrueAsync coroutine engine
            - **http_server** — Built-in HTTP/1+2 server
            - **redis** — Redis client (phpredis)
            - **clickhouse** — ClickHouse client (php-clickhouse)
            - **xdebug** — Debugger and profiler

            ### Downloads
            - **Release** build — for general use
            - **Debug** build — for PHP/extension development (includes debug symbols and assertions)
            - **FrankenPHP** build — `frankenphp.exe` + PHP runtime, ready to run

            ### Installation

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/true-async/releases/main/installer/install.ps1 | iex
            ```

            ### Verify
            ```powershell
            php -v
            php -m | findstr async
            ```

            ### Checksums
            See `sha256sums.txt` for SHA256 checksums of all files.
          files: release-files/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Update website download page
  # ---------------------------------------------------------------------------
  update-website:
    if: ${{ !inputs.test_only && needs.config.outputs.is_prerelease == 'false' }}
    needs: [config, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v7
        with:
          repository: true-async/true-async.github.io
          token: ${{ secrets.SITE_DEPLOY_TOKEN }}

      - name: Update releases.json
        run: |
          set -euo pipefail
          VERSION="${{ needs.config.outputs.version }}"
          PHP_VERSION="${{ needs.config.outputs.php_version }}"
          DATE="$(date +%Y-%m-%d)"
          TAG="v${VERSION}"
          BASE_URL="https://github.com/true-async/releases/releases"
          DATA_FILE=".vitepress/data/releases.json"

          # New version entry — FrankenPHP addons included.
          NEW_ENTRY=$(jq -n \
            --arg version      "${VERSION}" \
            --arg date         "${DATE}" \
            --arg php_version  "${PHP_VERSION}" \
            --arg changelog    "${BASE_URL}/tag/${TAG}" \
            --arg zip          "${BASE_URL}/download/${TAG}/php-trueasync-${VERSION}-php${PHP_VERSION}-windows-x64.zip" \
            --arg zip_debug    "${BASE_URL}/download/${TAG}/php-trueasync-${VERSION}-php${PHP_VERSION}-windows-x64-debug.zip" \
            --arg zip_fp       "${BASE_URL}/download/${TAG}/php-trueasync-${VERSION}-php${PHP_VERSION}-windows-x64-frankenphp.zip" \
            --arg zip_fp_debug "${BASE_URL}/download/${TAG}/php-trueasync-${VERSION}-php${PHP_VERSION}-windows-x64-debug-frankenphp.zip" \
            '{
              version: $version,
              date: $date,
              php_requires: ("PHP " + $php_version + "-dev (ZTS)"),
              changelog_url: $changelog,
              old: false,
              platforms: [{
                name: "Windows",
                files: [
                  { name: ($zip       | split("/") | last), label: "Release",          url: $zip,       size: "~38 MB", sha256: "see sha256sums.txt in release" },
                  { name: ($zip_debug | split("/") | last), label: "Debug",            url: $zip_debug, size: "~36 MB", sha256: "see sha256sums.txt in release" },
                  { name: ($zip_fp    | split("/") | last), label: "FrankenPHP",       url: $zip_fp,    size: "~19 MB", sha256: "see sha256sums.txt in release" },
                  { name: ($zip_fp_debug | split("/") | last), label: "FrankenPHP Debug", url: $zip_fp_debug, size: "~19 MB", sha256: "see sha256sums.txt in release" }
                ]
              }]
            }')

          # Fresh docker_images for this version.
          NEW_DOCKER=$(jq -n --arg v "${VERSION}" --arg pv "${PHP_VERSION}" '[
            {"tag": ("trueasync/php-true-async:" + $v + "-php" + $pv),              "description": "Ubuntu 24.04 — CLI + FPM"},
            {"tag": ("trueasync/php-true-async:" + $v + "-php" + $pv + "-alpine"),  "description": "Alpine 3.20 — CLI + FPM (lightweight)"},
            {"tag": ("trueasync/php-true-async:" + $v + "-php" + $pv + "-debug"),   "description": "Ubuntu 24.04 — CLI + FPM (debug symbols)"},
            {"tag": ("trueasync/php-true-async:" + $v + "-php" + $pv + "-frankenphp"), "description": "Ubuntu 24.04 — FrankenPHP (Caddy + async worker)"},
            {"tag": "trueasync/php-true-async:latest",            "description": "Ubuntu 24.04 — alias for latest stable"},
            {"tag": "trueasync/php-true-async:latest-alpine",     "description": "Alpine 3.20 — alias for latest stable"},
            {"tag": "trueasync/php-true-async:latest-frankenphp", "description": "FrankenPHP — alias for latest stable"}
          ]')

          # Transform: dedupe by version (idempotent on re-tag), mark others old, prepend new.
          jq --argjson entry "$NEW_ENTRY" --argjson docker "$NEW_DOCKER" --arg v "${VERSION}" '
            .dockerImages = $docker
            | .versions = (
                [$entry]
                + (.versions
                    | map(select((.version | tostring) != $v))
                    | map(.old = true))
              )
          ' "${DATA_FILE}" > "${DATA_FILE}.tmp"
          mv "${DATA_FILE}.tmp" "${DATA_FILE}"

          echo "Updated ${DATA_FILE} for v${VERSION}"
          jq '.versions | map({version, old})' "${DATA_FILE}"

      - name: Commit and push
        run: |
          set -euo pipefail
          DATA_FILE=".vitepress/data/releases.json"
          if git diff --quiet "${DATA_FILE}"; then
            echo "No changes to ${DATA_FILE}, skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${DATA_FILE}"
          git commit -m "Update download page for v${{ needs.config.outputs.version }}"
          git pull --rebase
          git push
