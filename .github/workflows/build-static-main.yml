name: Build Static (main — TEMP)

# TEMPORARY verification workflow. Same as build-static.yml but pins the
# true-async extensions to their development branches instead of the release
# tags in build-config.json, so fixes that are on the ext repos' main/dev
# branch (but not yet tagged) can be verified end-to-end.
#
#   server     -> main
#   phpredis   -> true-async
#   clickhouse -> main
#
# The Windows job is intentionally omitted: it builds only php-src + ext/async
# and never compiles server/redis/clickhouse, so it verifies nothing here.
#
# DELETE this file once the fixes are tagged and build-config.json is bumped.

on:
  workflow_dispatch:
    inputs:
      test_only:
        description: 'Test build only (no release, no artifacts published)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  SPC_REPO: true-async/static-php-cli
  SPC_REF: true-async
  # clickhouse temporarily excluded: true-async/php-clickhouse is a heavy C++17
  # extension (module clickhouse_async, bundled clickhouse-cpp submodule +
  # cityhash/lz4/zstd/absl static libs) that needs its own static-php-cli
  # package integration. Tracked separately; re-add once integrated.
  EXTENSIONS: >-
    async,server,redis,bcmath,calendar,ctype,curl,dom,exif,
    fileinfo,filter,ftp,gmp,iconv,intl,mbstring,mbregex,opcache,openssl,
    pcntl,pdo,pdo_mysql,pdo_pgsql,pdo_sqlite,pgsql,phar,posix,session,
    shmop,simplexml,soap,sockets,sqlite3,tokenizer,xml,xmlreader,
    xmlwriter,xsl,zip,zlib

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      php_version: ${{ steps.read.outputs.php_version }}
      php_src_repo: ${{ steps.read.outputs.php_src_repo }}
      php_src_branch: ${{ steps.read.outputs.php_src_branch }}
      async_repo: ${{ steps.read.outputs.async_repo }}
      async_branch: ${{ steps.read.outputs.async_branch }}
      server_repo: ${{ steps.read.outputs.server_repo }}
      phpredis_repo: ${{ steps.read.outputs.phpredis_repo }}
      clickhouse_repo: ${{ steps.read.outputs.clickhouse_repo }}
    steps:
      - uses: actions/checkout@v7

      - name: Read build-config.json
        id: read
        run: |
          echo "php_version=$(jq -r '.php_version' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "php_src_repo=$(jq -r '.php_src.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "php_src_branch=$(jq -r '.php_src.branch' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "async_repo=$(jq -r '.extensions.async.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "async_branch=$(jq -r '.extensions.async.branch' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "server_repo=$(jq -r '.extensions.server.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "phpredis_repo=$(jq -r '.extensions.phpredis.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "clickhouse_repo=$(jq -r '.extensions.clickhouse.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "version=dev-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

  build-static:
    needs: config
    name: "Static (${{ matrix.name }})"
    runs-on: ${{ matrix.runner }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            arch: x86_64
            os: linux
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            arch: aarch64
            os: linux
          - name: macos-aarch64
            runner: macos-14
            arch: aarch64
            os: macos
          - name: macos-x86_64
            runner: macos-15-intel
            arch: x86_64
            os: macos
    steps:
      - name: Setup PHP (host for static-php-cli)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, zlib, curl, dom, xml, tokenizer
          tools: composer

      - name: Checkout static-php-cli fork
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SPC_REPO }}
          ref: ${{ env.SPC_REF }}
          path: spc

      - name: Install static-php-cli dependencies
        working-directory: spc
        run: composer install --no-dev --no-interaction --no-progress

      - name: Normalize extension list
        id: exts
        run: echo "list=$(echo '${{ env.EXTENSIONS }}' | tr -d ' \n')" >> "$GITHUB_OUTPUT"

      - name: spc doctor (install build tools)
        working-directory: spc
        run: php bin/spc doctor --auto-fix || true

      - name: Download sources
        working-directory: spc
        run: |
          # TEMP: true-async extensions pinned to their dev branches (not tags).
          # pecl.php.net downloads are flaky and a single failed artifact aborts
          # the whole parallel batch. Retry a few times; spc reuses already
          # downloaded artifacts and only re-fetches what is still missing. Drop
          # to serial (-P 1) on later attempts to reduce pecl rate-limit hits.
          attempt=1
          max_attempts=4
          while true; do
            conc=$([ "$attempt" -le 2 ] && echo 4 || echo 1)
            echo "::group::spc download (attempt $attempt/$max_attempts, -P $conc)"
            if php bin/spc download \
                --for-extensions "${{ steps.exts.outputs.list }}" \
                --for-packages "php-micro" \
                --custom-git "php-src:${{ needs.config.outputs.php_src_branch }}:https://github.com/true-async/php-src.git" \
                --custom-git "ext-async:${{ needs.config.outputs.async_branch }}:https://github.com/true-async/php-async.git" \
                --custom-git "ext-server:main:https://github.com/${{ needs.config.outputs.server_repo }}.git" \
                --custom-git "ext-redis:true-async:https://github.com/${{ needs.config.outputs.phpredis_repo }}.git" \
                --prefer-binary -P "$conc"; then
              echo "::endgroup::"
              echo "spc download succeeded on attempt $attempt"
              break
            fi
            echo "::endgroup::"
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "spc download failed after $max_attempts attempts" >&2
              exit 1
            fi
            echo "spc download attempt $attempt failed; retrying in 15s..."
            sleep 15
            attempt=$((attempt + 1))
          done

      - name: Build static CLI + micro (ZTS)
        working-directory: spc
        run: |
          php bin/spc build "${{ steps.exts.outputs.list }}" \
            --build-cli --build-micro --enable-zts

      - name: Dump build logs on failure
        if: failure()
        working-directory: spc
        run: |
          echo "===== php-src.config.log (tail) ====="
          tail -150 log/php-src.config.log 2>/dev/null || true
          echo "===== spc.shell.log (tail) ====="
          tail -100 log/spc.shell.log 2>/dev/null || true
          echo "===== main/internal_functions_cli.c (generated) ====="
          cat source/php-src/main/internal_functions_cli.c 2>/dev/null || true

      - name: Verify binary
        working-directory: spc
        run: |
          ./buildroot/bin/php -v
          ./buildroot/bin/php -m | grep -iE "async|redis"
          test -f buildroot/bin/micro.sfx && echo "micro.sfx: OK"
          if [ "${{ matrix.os }}" = "linux" ]; then ldd ./buildroot/bin/php || true; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: static-main-${{ matrix.name }}
          path: spc/buildroot/bin/php
