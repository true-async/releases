name: Build Android Demo APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'demo/android/**'
      - '.github/workflows/build-android-demo.yml'

jobs:
  build-php:
    name: "Build PHP (${{ matrix.abi }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, x86_64]
    steps:
      - uses: actions/checkout@v7

      - name: Cache NDK
        uses: actions/cache@v5
        with:
          path: /tmp/android-ndk-r27
          key: android-ndk-r27

      - name: Cache PHP deps
        uses: actions/cache@v5
        with:
          path: /tmp/trueasync-android-deps-${{ matrix.abi }}
          key: android-deps-${{ matrix.abi }}-${{ hashFiles('build-config.json', 'scripts/build-android.sh') }}

      - name: Build libphp.a
        run: |
          chmod +x scripts/build-android.sh
          scripts/build-android.sh \
            --abi ${{ matrix.abi }} \
            --output-dir "${{ github.workspace }}/out/android" \
            --jobs $(nproc)

      - name: Upload PHP artifact
        uses: actions/upload-artifact@v7
        with:
          name: php-android-${{ matrix.abi }}
          path: out/android/trueasync-php-android-${{ matrix.abi }}.zip
          retention-days: 1

  build-apk:
    name: "Build APK"
    needs: build-php
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download arm64-v8a
        uses: actions/download-artifact@v8
        with:
          name: php-android-arm64-v8a
          path: php-artifacts/arm64-v8a

      - name: Download x86_64
        uses: actions/download-artifact@v8
        with:
          name: php-android-x86_64
          path: php-artifacts/x86_64

      - name: Extract PHP libs
        run: |
          cd demo/android
          chmod +x prepare.sh
          ./prepare.sh \
            --arm64 ../../php-artifacts/arm64-v8a/trueasync-php-android-arm64-v8a.zip \
            --x64   ../../php-artifacts/x86_64/trueasync-php-android-x86_64.zip

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        working-directory: demo/android
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: trueasync-demo-debug
          path: demo/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
