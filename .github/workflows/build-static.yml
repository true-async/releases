name: Build Static Binaries

# Self-contained, statically linked TrueAsync PHP binaries (no system PHP
# needed to run them) built with static-php-cli. See true-async/php-async#156.
#
# Build matrix starts with linux-x86_64 only; arm64 and macOS targets are
# added once the first target is green (see the `matrix.include` block).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      test_only:
        description: 'Test build only (no release, no artifacts published)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  # static-php-cli fork carrying the ext-async + php-src-fork config.
  SPC_REPO: true-async/static-php-cli
  SPC_REF: true-async
  # Extensions compiled into the static binary, close to build-config.json's
  # common set. intl is included; the fork patches PHP's snprintf macros so
  # ext-intl's C++ TUs compile under the zig libc++ toolchain.
  EXTENSIONS: >-
    async,server,redis,clickhouse,bcmath,calendar,ctype,curl,dom,exif,
    fileinfo,filter,ftp,gmp,iconv,intl,mbstring,mbregex,opcache,openssl,
    pcntl,pdo,pdo_mysql,pdo_pgsql,pdo_sqlite,pgsql,phar,posix,session,
    shmop,simplexml,soap,sockets,sqlite3,tokenizer,xml,xmlreader,
    xmlwriter,xsl,zip,zlib

jobs:
  # ---------------------------------------------------------------------------
  # Read build configuration (version, php version, php-src ref)
  # ---------------------------------------------------------------------------
  config:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      php_version: ${{ steps.read.outputs.php_version }}
      php_src_repo: ${{ steps.read.outputs.php_src_repo }}
      php_src_branch: ${{ steps.read.outputs.php_src_branch }}
      async_repo: ${{ steps.read.outputs.async_repo }}
      async_branch: ${{ steps.read.outputs.async_branch }}
      server_repo: ${{ steps.read.outputs.server_repo }}
      server_branch: ${{ steps.read.outputs.server_branch }}
      phpredis_repo: ${{ steps.read.outputs.phpredis_repo }}
      phpredis_branch: ${{ steps.read.outputs.phpredis_branch }}
      clickhouse_repo: ${{ steps.read.outputs.clickhouse_repo }}
      clickhouse_branch: ${{ steps.read.outputs.clickhouse_branch }}
      is_prerelease: ${{ steps.read.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v7

      - name: Read build-config.json
        id: read
        run: |
          echo "php_version=$(jq -r '.php_version' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "php_src_repo=$(jq -r '.php_src.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "php_src_branch=$(jq -r '.php_src.branch' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "async_repo=$(jq -r '.extensions.async.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "async_branch=$(jq -r '.extensions.async.branch' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "server_repo=$(jq -r '.extensions.server.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "server_branch=$(jq -r '.extensions.server.branch' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "phpredis_repo=$(jq -r '.extensions.phpredis.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "phpredis_branch=$(jq -r '.extensions.phpredis.branch' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "clickhouse_repo=$(jq -r '.extensions.clickhouse.repo' build-config.json)" >> "$GITHUB_OUTPUT"
          echo "clickhouse_branch=$(jq -r '.extensions.clickhouse.branch' build-config.json)" >> "$GITHUB_OUTPUT"
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="dev-$(date +%Y%m%d-%H%M%S)"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Build the static binary per target
  # ---------------------------------------------------------------------------
  build-static:
    needs: config
    name: "Static (${{ matrix.name }})"
    runs-on: ${{ matrix.runner }}
    # Authenticate spc's GitHub API calls (version resolution) to avoid the
    # unauthenticated 60 req/h rate limit, which 403s on shared CI runners.
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            arch: x86_64
            os: linux
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            arch: aarch64
            os: linux
          - name: macos-aarch64
            runner: macos-14
            arch: aarch64
            os: macos
          - name: macos-x86_64
            runner: macos-15-intel
            arch: x86_64
            os: macos
    steps:
      - name: Setup PHP (host for static-php-cli)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, zlib, curl, dom, xml, tokenizer
          tools: composer

      - name: Checkout static-php-cli fork
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SPC_REPO }}
          ref: ${{ env.SPC_REF }}
          path: spc

      - name: Install static-php-cli dependencies
        working-directory: spc
        run: composer install --no-dev --no-interaction --no-progress

      - name: Normalize extension list
        id: exts
        run: echo "list=$(echo '${{ env.EXTENSIONS }}' | tr -d ' \n')" >> "$GITHUB_OUTPUT"

      - name: spc doctor (install build tools)
        working-directory: spc
        run: php bin/spc doctor --auto-fix || true

      - name: Download sources
        working-directory: spc
        run: |
          php bin/spc download \
            --for-extensions "${{ steps.exts.outputs.list }}" \
            --for-packages "php-micro" \
            --custom-git "php-src:${{ needs.config.outputs.php_src_branch }}:https://github.com/true-async/php-src.git" \
            --custom-git "ext-async:${{ needs.config.outputs.async_branch }}:https://github.com/true-async/php-async.git" \
            --custom-git "ext-server:${{ needs.config.outputs.server_branch }}:https://github.com/${{ needs.config.outputs.server_repo }}.git" \
            --custom-git "ext-redis:${{ needs.config.outputs.phpredis_branch }}:https://github.com/${{ needs.config.outputs.phpredis_repo }}.git" \
            --custom-git "ext-clickhouse:${{ needs.config.outputs.clickhouse_branch }}:https://github.com/${{ needs.config.outputs.clickhouse_repo }}.git" \
            --prefer-binary -P 4

      - name: Build static CLI + micro (ZTS)
        working-directory: spc
        run: |
          php bin/spc build "${{ steps.exts.outputs.list }}" \
            --build-cli --build-micro --enable-zts

      - name: Dump build logs on failure
        if: failure()
        working-directory: spc
        run: |
          echo "===== php-src.config.log (tail) ====="
          tail -150 log/php-src.config.log 2>/dev/null || true
          echo "===== spc.shell.log (tail) ====="
          tail -100 log/spc.shell.log 2>/dev/null || true
          echo "===== main/internal_functions_cli.c (generated) ====="
          cat source/php-src/main/internal_functions_cli.c 2>/dev/null || true
          echo "===== main/internal_functions.c (generated) ====="
          cat source/php-src/main/internal_functions.c 2>/dev/null || true

      - name: Verify binary
        working-directory: spc
        run: |
          ./buildroot/bin/php -v
          ./buildroot/bin/php -m | grep -iE "async|redis|clickhouse"
          test -f buildroot/bin/micro.sfx && echo "micro.sfx: OK"
          if [ "${{ matrix.os }}" = "linux" ]; then ldd ./buildroot/bin/php || true; fi

      - name: Package
        id: pkg
        working-directory: spc
        run: |
          PKG="php-trueasync-${{ needs.config.outputs.version }}-php${{ needs.config.outputs.php_version }}-${{ matrix.name }}"
          mkdir -p "dist/${PKG}"
          cp buildroot/bin/php "dist/${PKG}/"
          [ -f buildroot/bin/micro.sfx ] && cp buildroot/bin/micro.sfx "dist/${PKG}/" || true
          tar -C dist -czf "${PKG}.tar.gz" "${PKG}"
          echo "file=spc/${PKG}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: static-${{ matrix.name }}
          path: ${{ steps.pkg.outputs.file }}

      - name: Publish to release
        if: ${{ github.event_name == 'push' && !inputs.test_only }}
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ needs.config.outputs.is_prerelease == 'true' }}
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.pkg.outputs.file }}

  # ---------------------------------------------------------------------------
  # Windows x86_64 static CLI build (MSVC / PHP SDK)
  # ---------------------------------------------------------------------------
  build-windows-static:
    name: "Static (windows-x86_64)"
    needs: config
    runs-on: windows-2025-vs2026
    env:
      PHP_BUILD_CACHE_BASE_DIR: C:\build-cache
      PHP_BUILD_OBJ_DIR: C:\obj
      PHP_BUILD_CACHE_SDK_DIR: C:\build-cache\sdk
      PHP_BUILD_SDK_BRANCH: php-sdk-2.7.1
      PHP_BUILD_CRT: vs18
      PLATFORM: x64
      THREAD_SAFE: "1"

    steps:
      - name: git config
        run: git config --global core.autocrlf false && git config --global core.eol lf

      - uses: actions/checkout@v7

      - name: Checkout php-src
        uses: actions/checkout@v7
        with:
          repository: ${{ needs.config.outputs.php_src_repo }}
          ref: ${{ needs.config.outputs.php_src_branch }}
          path: php-src

      - name: Checkout ext/async
        uses: actions/checkout@v7
        with:
          repository: ${{ needs.config.outputs.async_repo }}
          ref: ${{ needs.config.outputs.async_branch }}
          path: async

      - name: Copy async extension to ext/async
        shell: cmd
        run: |
          if not exist php-src\ext\async mkdir php-src\ext\async
          xcopy /E /I /H /Y async php-src\ext\async

      - name: Setup LibUV
        shell: powershell
        env:
          VCPKG_DEFAULT_BINARY_CACHE: C:\vcpkg-cache
        run: |
          choco install cmake ninja -y --no-progress | Out-Null
          if (!(Test-Path "C:\vcpkg")) {
            git clone --depth 1 --branch 2025.04.09 https://github.com/Microsoft/vcpkg.git C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          New-Item -ItemType Directory -Force -Path C:\vcpkg-cache | Out-Null
          C:\vcpkg\vcpkg.exe install libuv:x64-windows-static-md

      - name: Setup PHP SDK and download deps
        shell: cmd
        run: |
          if not exist "%PHP_BUILD_CACHE_BASE_DIR%" mkdir "%PHP_BUILD_CACHE_BASE_DIR%"
          if not exist "%PHP_BUILD_OBJ_DIR%" mkdir "%PHP_BUILD_OBJ_DIR%"
          git clone --branch %PHP_BUILD_SDK_BRANCH% --depth 1 https://github.com/php/php-sdk-binary-tools.git "%PHP_BUILD_CACHE_SDK_DIR%"

          cd php-src
          for /f "usebackq tokens=3" %%i in (`findstr PHP_MAJOR_VERSION main\php_version.h`) do set BRANCH=%%i
          for /f "usebackq tokens=3" %%i in (`findstr PHP_MINOR_VERSION main\php_version.h`) do set BRANCH=%BRANCH%.%%i
          echo BRANCH=%BRANCH%>> %GITHUB_ENV%

          set DEPS_DIR=%PHP_BUILD_CACHE_BASE_DIR%\deps-%BRANCH%-%PHP_BUILD_CRT%-%PLATFORM%
          echo DEPS_DIR=%DEPS_DIR%>> %GITHUB_ENV%

          set SDK_RUNNER=%PHP_BUILD_CACHE_SDK_DIR%\phpsdk-%PHP_BUILD_CRT%-%PLATFORM%.bat

          > %GITHUB_WORKSPACE%\task_deps.bat echo @echo off
          >> %GITHUB_WORKSPACE%\task_deps.bat echo phpsdk_deps --update --no-backup --branch %BRANCH% --stability staging --deps %DEPS_DIR% --crt %PHP_BUILD_CRT%
          >> %GITHUB_WORKSPACE%\task_deps.bat echo if %%errorlevel%% neq 0 exit /b 3
          cmd /c %SDK_RUNNER% -t %GITHUB_WORKSPACE%\task_deps.bat
          if %errorlevel% neq 0 exit /b %errorlevel%

          if not exist "%DEPS_DIR%\include\libuv" mkdir "%DEPS_DIR%\include\libuv"
          if not exist "%DEPS_DIR%\lib" mkdir "%DEPS_DIR%\lib"
          if not exist "%DEPS_DIR%\bin" mkdir "%DEPS_DIR%\bin"
          copy "C:\vcpkg\installed\x64-windows-static-md\include\uv.h" "%DEPS_DIR%\include\libuv\uv.h"
          xcopy /E /I /H /Y "C:\vcpkg\installed\x64-windows-static-md\include\uv" "%DEPS_DIR%\include\libuv\uv\"
          copy "C:\vcpkg\installed\x64-windows-static-md\lib\libuv.lib" "%DEPS_DIR%\lib\libuv.lib"

      - name: Build PHP CLI
        shell: pwsh
        run: |
          @(
            "@echo off",
            "cd /d $($env:GITHUB_WORKSPACE)\php-src",
            "if %errorlevel% neq 0 exit /b 3",
            "call buildconf.bat --force",
            "if %errorlevel% neq 0 exit /b 3",
            "call configure.bat --enable-snapshot-build --disable-debug-pack --enable-cli --disable-cgi --disable-phpdbg --enable-embed --enable-async --enable-object-out-dir=%PHP_BUILD_OBJ_DIR% --with-php-build=%DEPS_DIR%",
            "if %errorlevel% neq 0 exit /b 3",
            "nmake /NOLOGO",
            "if %errorlevel% neq 0 exit /b 3",
            "exit /b 0"
          ) | Set-Content -Path "$env:GITHUB_WORKSPACE\task_build.bat" -Encoding ASCII
          $sdk = "$env:PHP_BUILD_CACHE_SDK_DIR\phpsdk-$env:PHP_BUILD_CRT-$env:PLATFORM.bat"
          cmd /c "$sdk" -t "$env:GITHUB_WORKSPACE\task_build.bat"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package
        id: pkg
        shell: pwsh
        run: |
          $version    = "${{ needs.config.outputs.version }}"
          $phpVersion = "${{ needs.config.outputs.php_version }}"
          $buildDir   = "$env:PHP_BUILD_OBJ_DIR\Release_TS"
          $pkgName    = "php-trueasync-${version}-php${phpVersion}-windows-x86_64"
          $stageDir   = "$env:GITHUB_WORKSPACE\stage-win"
          New-Item -ItemType Directory -Force -Path "$stageDir\ext" | Out-Null

          # php.exe and dep DLLs (not php_*.dll extensions)
          $extNames = (Get-ChildItem $buildDir -Filter "php_*.dll").Name
          Get-ChildItem $buildDir -Filter "*.exe" | Copy-Item -Destination $stageDir -Force
          Get-ChildItem $buildDir -Filter "*.dll" |
            Where-Object { $_.Name -notin $extNames } |
            Copy-Item -Destination $stageDir -Force
          Get-ChildItem $buildDir -Filter "php_*.dll" |
            Copy-Item -Destination "$stageDir\ext" -Force
          if (Test-Path "$env:DEPS_DIR\bin\uv.dll") {
            Copy-Item "$env:DEPS_DIR\bin\uv.dll" $stageDir -Force
          }

          $devIni = "$env:GITHUB_WORKSPACE\php-src\php.ini-development"
          if (Test-Path $devIni) {
            Copy-Item $devIni "$stageDir\php.ini" -Force
            Add-Content "$stageDir\php.ini" "`nextension_dir = `"ext`""
          }

          $archive = "${pkgName}.zip"
          Compress-Archive -Path "$stageDir\*" -DestinationPath "$env:GITHUB_WORKSPACE\$archive" -Force
          "file=$archive" >> $env:GITHUB_OUTPUT
          Write-Host "Packaged: $archive"
          Get-ChildItem $stageDir | Format-Table Name, @{N='Size';E={'{0:N0}' -f $_.Length}}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: static-windows-x86_64
          path: ${{ steps.pkg.outputs.file }}

      - name: Publish to release
        if: ${{ github.event_name == 'push' && !inputs.test_only }}
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ needs.config.outputs.is_prerelease == 'true' }}
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.pkg.outputs.file }}
